apiVersion: apps/v1
kind: Deployment
metadata:
  name: kerala-ayalkootam-manager
  labels:
    app: kerala-ayalkootam-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kerala-ayalkootam-manager
  template:
    metadata:
      labels:
        app: kerala-ayalkootam-manager
    spec:
      containers:
        - name: app
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "5000"
            - name: CLIENT_URL
              value: CLIENT_URL_PLACEHOLDER
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: ayalkootam-secrets
                  key: MONGO_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ayalkootam-secrets
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
